telemetry = false

[install]
# Optimize package installation for monorepo speed
smol = true
exact = true

[test]
# Exclude directories from test discovery
# pathIgnorePatterns = ["**/node_modules/**", "**/vendors/**", "**/dist/**"]
# Limit test discovery to plugins/ only (excludes vendors/, node_modules/, etc.)
# Note: pathIgnorePatterns is documented but not effective as of Bun 1.3.10
root = "plugins/rd3"
passWithNoTests = true
coverage = true # always enable coverage
# to require 90% line-level and function-level coverage
# coverageThreshold disabled - only checking global average
coverageThreshold = 0.9
# Note: coverageExclude in bunfig.toml not effective in Bun 1.3.11
# Temp dir files from inline-executor tests still leak into coverage reports.
# Shared infrastructure (logger.ts) intentionally has lower function coverage
# since it's tested via integration. Line coverage is 94%+.
