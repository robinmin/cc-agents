id: hardcoded-secret-javascript
language: javascript
message: "Potential hardcoded secret detected"
severity: error

rule:
  any:
    - kind: string
    - kind: template_string
  regex: "(sk-|pk-|token_|ghp_|xox[baprs]-)[a-zA-Z0-9_-]{10,}"
