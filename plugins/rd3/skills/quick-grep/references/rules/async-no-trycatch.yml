---
id: async-no-trycatch-javascript
language: javascript
message: "async function without catch-based error handling"
severity: warning

rule:
  all:
    - kind: await_expression
    - inside:
        any:
          - all:
              - kind: function_declaration
              - regex: '^async\s+function'
          - all:
              - kind: function_expression
              - regex: '^async\s+function'
          - all:
              - kind: arrow_function
              - regex: '^async\s*'
          - all:
              - kind: method_definition
              - regex: '^async\s+'
        stopBy: end
    - not:
        inside:
          all:
            - kind: try_statement
            - has:
                kind: catch_clause
                stopBy: end
          stopBy: end
