id: console-log-javascript
language: javascript
message: "Avoid console.* calls in production code"
severity: warning

rule:
  any:
    - pattern: console.log($$$)
    - pattern: console.warn($$$)
    - pattern: console.error($$$)
    - pattern: console.debug($$$)
    - pattern: console.info($$$)
