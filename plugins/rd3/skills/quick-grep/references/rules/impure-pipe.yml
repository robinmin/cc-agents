id: impure-pipe-javascript
language: javascript
message: "Promise chain without catch-based error handling"
severity: warning

rule:
  all:
    - pattern: $PROMISE.then($CB)
    - not:
        inside:
          pattern: $PROMISE.then($CB).catch($ERR_CB)
          stopBy: end
