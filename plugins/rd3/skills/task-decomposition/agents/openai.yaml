name: task-decomposition
description: "Structured methodology for deciding whether to decompose tasks and
  breaking complex requirements into actionable subtasks with dependency mapping
  and effort estimation. Outputs subtask checklists to the parent task's
  Solution section. Use for: planning features, decomposing work, estimating
  effort, creating WBS-structured breakdowns. NOT for: task file operations (use
  rd3:tasks), business analysis, or system architecture."
