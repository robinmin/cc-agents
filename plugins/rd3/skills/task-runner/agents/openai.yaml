name: task-runner
description: "Workflow-owned task execution loop with optional refine, plan,
  implement/test cycle, verification, and pre/post-flight quality gates. Use
  when: running a task from refinement through completion; executing presets
  (simple/standard/complex/research); needing staged execution (plan-only,
  implement-only); needing pre-flight task file validation or post-flight
  completion-proof gate. Triggers: 'run task', 'execute task', 'dev-run', 'task
  workflow', 'implement task end-to-end'. NOT for: DAG scheduling (use
  orchestration-v2), source-only code review (use dev-review), docs refresh (use
  dev-docs)."
version: 1.0.0
icon: 🛠️
category: orchestration
tags:
  - task-execution
  - workflow
  - implement-test-loop
  - verification
  - staged-execution
