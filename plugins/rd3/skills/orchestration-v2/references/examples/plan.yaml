# Plan only — architecture + design + decomposition
schema_version: 1
name: plan

stack:
  language: typescript
  runtime: bun
  linter: biome
  test: "bun test"
  coverage: "bun test --coverage"

phases:
  arch:
    skill: rd3:backend-architect
    gate: { type: auto }
    timeout: 1h

  design:
    skill: rd3:backend-design
    gate: { type: auto }
    timeout: 1h
    after: [arch]

  decompose:
    skill: rd3:task-decomposition
    gate: { type: auto }
    timeout: 30m
    after: [design]
