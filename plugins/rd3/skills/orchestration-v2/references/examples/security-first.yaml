# Security-first pipeline — adds security scan parallel with test/review
schema_version: 1
name: security-first

stack:
  language: typescript
  runtime: bun
  linter: biome
  test: "bun test"
  coverage: "bun test --coverage"

phases:
  intake:
    skill: rd3:request-intake
    gate: { type: command, command: "echo 'intake complete'" }
    timeout: 30m

  arch:
    skill: rd3:backend-architect
    gate: { type: auto }
    timeout: 1h
    after: [intake]

  design:
    skill: rd3:backend-design
    gate: { type: auto }
    timeout: 1h
    after: [arch]

  decompose:
    skill: rd3:task-decomposition
    gate: { type: command, command: "echo 'decompose complete'" }
    timeout: 30m
    after: [intake]

  implement:
    skill: rd3:code-implement-common
    gate:
      type: command
      command: "bun run check"
      rework: { max_iterations: 2, escalation: pause }
    timeout: 2h
    after: [decompose]
    payload:
      tdd: true
      sandbox: git-worktree

  test:
    skill: rd3:sys-testing
    gate:
      type: command
      command: "bun test --coverage"
      rework: { max_iterations: 3, escalation: pause }
    timeout: 1h
    after: [implement]
    payload:
      coverage_threshold: 80

  security-scan:
    skill: rd3:code-review-common
    gate:
      type: command
      command: "bun run lint"
      rework: { max_iterations: 2, escalation: pause }
    timeout: 30m
    after: [implement]
    payload:
      depth: thorough
      focus_areas: [security]
      security_only: true

  review:
    skill: rd3:code-review-common
    gate: { type: human }
    after: [test, security-scan]
    payload:
      depth: thorough
      focus_areas: [security, performance]

  verify-bdd:
    skill: rd3:bdd-workflow
    gate: { type: auto }
    timeout: 30m
    after: [review]
    payload:
      depth: standard

  verify-func:
    skill: rd3:functional-review
    gate: { type: auto }
    timeout: 30m
    after: [review]
    payload:
      depth: standard

presets:
  simple:
    phases: [intake, arch, design, decompose, implement, test]
    defaults: { coverage_threshold: 60 }
  standard:
    phases: [intake, arch, design, decompose, implement, test, security-scan, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 80 }
  complex:
    phases: [intake, arch, design, decompose, implement, test, security-scan, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 80 }
