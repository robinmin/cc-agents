# Default 7-phase pipeline for rd3
#
# DAG structure:
#   intake ──> arch ──> design ──┐
#        └──────────────────────> decompose ──> implement ──> test ──> review ──┬─> verify-bdd
#                                                                                └─> verify-func
#
# Key: decompose depends on intake directly so the standard preset (which skips
# arch+design) remains a valid subgraph.
#
# Note: docs generation is handled by a separate slash command (rd3:code-docs),
# not as a pipeline phase. PR creation is also out-of-band.

schema_version: 1
name: default

stack:
  language: typescript
  runtime: bun
  linter: biome
  test: "bun test"
  coverage: "bun test --coverage"

phases:
  intake:
    skill: rd3:request-intake
    gate: { type: auto }
    timeout: 30m

  arch:
    skill: rd3:backend-architect
    gate: { type: auto }
    timeout: 1h
    after: [intake]

  design:
    skill: rd3:backend-design
    gate: { type: auto }
    timeout: 1h
    after: [arch]

  decompose:
    skill: rd3:task-decomposition
    gate: { type: auto }
    timeout: 30m
    after: [intake]

  implement:
    skill: rd3:code-implement-common
    gate:
      type: command
      command: "bun run check"
      rework: { max_iterations: 2, escalation: pause }
    timeout: 2h
    after: [decompose]
    payload:
      # Advisory hints — passed to the skill but not engine-enforced.
      tdd: true                # Hint: write tests before implementation
      sandbox: git-worktree    # Hint: use worktree isolation

  test:
    skill: rd3:sys-testing
    gate:
      type: command
      command: "bun run test"
      rework: { max_iterations: 3, escalation: pause }
    timeout: 1h
    after: [implement]
    payload:
      # coverage_threshold is also set in preset defaults and can be
      # overridden via CLI --coverage flag.
      coverage_threshold: 80

  review:
    skill: rd3:code-review-common
    gate:
      type: human
      blocking: false # Advisory — LLM review sufficient, human optional
    after: [test]
    payload:
      # Advisory hints for review depth and focus.
      depth: thorough
      focus_areas: [security, performance]

  verify-bdd:
    skill: rd3:bdd-workflow
    gate: { type: auto }
    timeout: 30m
    after: [review]
    payload:
      depth: standard

  verify-func:
    skill: rd3:functional-review
    gate: { type: auto }
    timeout: 30m
    after: [review]
    payload:
      depth: standard

# ── Task presets ────────────────────────────────────────────────────────────────
#
# | Preset    | Phases                                                          |
# |-----------|-----------------------------------------------------------------|
# | default   | intake, decompose, implement, test, review, verify-bdd, verify-func |
# | simple    | intake, implement, test, review                                |
# | standard  | intake, decompose, implement, test, review, verify-bdd, verify-func |
# | complex   | arch, design + standard                                        |
# | research  | same as complex, lower coverage (60%)                          |

presets:
  default:
    phases: [intake, decompose, implement, test, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 80 }

  simple:
    phases: [intake, implement, test, review]
    defaults: { coverage_threshold: 60 }

  standard:
    phases: [intake, decompose, implement, test, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 80 }

  complex:
    phases: [intake, arch, design, decompose, implement, test, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 80 }

  research:
    phases: [intake, arch, design, decompose, implement, test, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 60 }

  # ── Phase profiles (single-phase convenience presets) ─────────────────────────

  refine:
    phases: [intake]

  plan:
    phases: [arch, design, decompose]

  unit:
    phases: [test]
    defaults: { coverage_threshold: 90 }

  review-only:
    phases: [review]
