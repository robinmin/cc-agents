# Documentation only — single-phase pipeline for rd3:code-docs
schema_version: 1
name: docs

stack:
  language: typescript
  runtime: bun
  linter: biome
  test: "bun test"
  coverage: "bun test --coverage"

phases:
  docs:
    skill: rd3:code-docs
    gate: { type: command, command: "bun run typecheck" }
    timeout: 30m
