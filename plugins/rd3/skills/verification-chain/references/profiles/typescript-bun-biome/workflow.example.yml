name: rd3-verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-rd3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint:rd3
      - run: bun run test:rd3
