# Default 9-phase pipeline for rd3
#
# Faithfully maps the rd3 9-phase workflow into v2 DAG format.
# See: plugins/rd3/skills/orchestration-v1/references/phase-matrix.md
#
# DAG structure:
#   intake ──> arch ──> design ──┐
#        └──────────────────────> decompose ──> implement ──> test ──> review ──┬─> verify-bdd ─┬─> docs
#                                                                                └─> verify-func ┘
#
# Key: decompose depends on intake directly so the standard preset (which skips
# arch+design) remains a valid subgraph.

schema_version: 1
name: default

stack:
  language: typescript
  runtime: bun
  linter: biome
  test: "bun test"
  coverage: "bun test --coverage"

phases:
  intake:
    skill: rd3:request-intake
    gate: { type: auto }
    timeout: 30m

  arch:
    skill: rd3:backend-architect
    gate: { type: auto }
    timeout: 1h
    after: [intake]

  design:
    skill: rd3:backend-design
    gate: { type: auto }
    timeout: 1h
    after: [arch]

  decompose:
    skill: rd3:task-decomposition
    gate: { type: auto }
    timeout: 30m
    after: [intake]

  implement:
    skill: rd3:code-implement-common
    gate:
      type: command
      command: "bun run format && bun run lint && bun run typecheck"
      rework: { max_iterations: 2, escalation: pause }
    timeout: 2h
    after: [decompose]
    payload:
      tdd: true
      sandbox: git-worktree

  test:
    skill: rd3:sys-testing
    gate:
      type: command
      command: "bun run test"
      rework: { max_iterations: 3, escalation: pause }
    timeout: 1h
    after: [implement]
    payload:
      coverage_threshold: 80

  review:
    skill: rd3:code-review-common
    gate:
      type: human
      blocking: false  # Advisory - LLM review sufficient, human optional
    after: [test]
    payload:
      depth: thorough
      focus_areas: [security, performance]

  verify-bdd:
    skill: rd3:bdd-workflow
    gate: { type: auto }
    timeout: 30m
    after: [review]
    payload:
      depth: standard

  verify-func:
    skill: rd3:functional-review
    gate: { type: auto }
    timeout: 30m
    after: [review]
    payload:
      depth: standard

  docs:
    skill: rd3:code-docs
    gate:
      type: command
      command: "bun run typecheck"
    timeout: 30m
    after: [verify-bdd, verify-func]
    payload:
      architecture: docs/spec/orchestrator-architecture-v2.md
      spec: docs/spec/orchestrator-fsd-v2.md
      user_manual: docs/spec/orchestrator-user-manual-v2.md

  pr:
    skill: rd3:git-workflow
    gate:
      type: human
      blocking: true
      prompt: "Review PR, approve merge, or reject with feedback"
    timeout: 30m
    after: [docs]

# ── Task profiles ───────────────────────────────────────────────────────────────
#
# | Profile          | Phases (no docs/pr)                                     |
# |------------------|--------------------------------------------------------|
# | default          | intake, decompose, implement, test, review, verify-bdd, verify-func |
# | default+docs     | default + docs                                         |
# | simple           | intake, decompose, implement, test                    |
# | standard         | default + docs, pr                                     |
# | complex          | arch, design + standard                                |
# | research         | arch, design + standard (60% coverage)                 |

presets:
  # Default for most tasks: standard workflow without docs/pr (manual opt-in)
  default:
    phases: [intake, decompose, implement, test, review, verify-bdd, verify-func]
    defaults: { coverage_threshold: 80 }

  # Include docs phase (no pr - pr is always human-gated)
  default+docs:
    phases: [intake, decompose, implement, test, review, verify-bdd, verify-func, docs]
    defaults: { coverage_threshold: 80 }

  simple:
    phases: [intake, decompose, implement, test]
    defaults: { coverage_threshold: 60 }

  standard:
    phases: [intake, decompose, implement, test, review, verify-bdd, verify-func, docs, pr]
    defaults: { coverage_threshold: 80 }

  complex:
    phases: [intake, arch, design, decompose, implement, test, review, verify-bdd, verify-func, docs, pr]
    defaults: { coverage_threshold: 80 }

  research:
    phases: [intake, arch, design, decompose, implement, test, review, verify-bdd, verify-func, docs, pr]
    defaults: { coverage_threshold: 60 }

  # ── Phase profiles (match v1 convenience commands) ────────────────────────────

  refine:
    phases: [intake]

  plan:
    phases: [arch, design, decompose]

  unit:
    phases: [test]
    defaults: { coverage_threshold: 90 }

  review-only:
    phases: [review]

  docs-only:
    phases: [docs]
